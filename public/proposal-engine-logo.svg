<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Proposal Engine">
  <!-- Brand-navy rounded base -->
  <rect width="64" height="64" rx="14" fill="#0A1264"/>

  <!-- Solid sans-serif P silhouette (stem + bowl drawn as a single closed
       path). No serifs, no extra strokes — the strong silhouette carries
       the mark from a 16px favicon up to large hero placements. -->
  <path fill="#FFFFFF" d="M14 12 H24 A12 12 0 0 1 24 36 V52 H14 Z"/>

  <!-- Brand-yellow counter (the inside of the P bowl). Filling the
       negative space with the brand accent locks one confident colour
       into the heart of the mark. -->
  <path fill="#FFCC00" d="M24 20 A4 4 0 0 1 24 28 Z"/>
</svg>
